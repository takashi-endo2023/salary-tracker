name: Deploy to salary.taka-techblog.com

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_DEMO_MODE: 'true'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-northeast-1

      - name: Sync static assets (1yr immutable)
        run: |
          aws s3 sync dist/assets "s3://${{ secrets.SALARY_S3_BUCKET }}/assets" \
            --cache-control "max-age=31536000,immutable" \
            --delete

      - name: Sync other files (no-cache)
        run: |
          aws s3 sync dist/ "s3://${{ secrets.SALARY_S3_BUCKET }}/" \
            --cache-control "max-age=0,no-cache" \
            --exclude "assets/*" \
            --delete

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ secrets.SALARY_CLOUDFRONT_DISTRIBUTION_ID }}" \
            --paths "/*"
